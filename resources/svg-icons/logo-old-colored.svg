<svg viewBox="22 20 56 67" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three Mölkky pins">
  <g stroke="#8A5A2B" stroke-width="5" stroke-linejoin="round">

    <!-- Back-left pin -->
    <rect x="26" y="24" width="20" height="52" rx="10" ry="12" fill="#D8A05A"/>
    <ellipse cx="36" cy="35" rx="10" ry="12" fill="#EBC489"/>

    <!-- Back-right pin -->
    <rect x="54" y="24" width="20" height="52" rx="10" ry="12" fill="#D8A05A"/>
    <ellipse cx="64" cy="35" rx="10" ry="12" fill="#EBC489"/>

    <!-- Front pin (lower, overlapping) -->
    <rect x="40" y="36" width="20" height="48" rx="10" ry="12" fill="#E0AC68"/>
    <ellipse cx="50" cy="42" rx="10" ry="12" fill="#F2CE96"/>
  </g>
</svg>
