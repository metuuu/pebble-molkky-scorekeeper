<svg viewBox="0 0 25 25" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three Mölkky pins">
  <!-- Pins are drawn as outlines; the fill (white) is applied by the icon
       generator via the manifest's "fill" setting so this source stays neutral. -->
  <g stroke="#000000" stroke-width="2" stroke-linejoin="round">

    <!-- Back-left pin -->
    <rect x="2" y="4" width="7" height="17" rx="3.5" ry="4"/>
    <ellipse cx="5.5" cy="7" rx="3.5" ry="4"/>

    <!-- Back-right pin -->
    <rect x="16" y="4" width="7" height="17" rx="3.5" ry="4"/>
    <ellipse cx="19.5" cy="7" rx="3.5" ry="4"/>

    <!-- Front pin (overlapping) -->
    <rect x="9" y="7" width="7" height="17" rx="3.5" ry="4"/>
    <ellipse cx="12.5" cy="10" rx="3.5" ry="4"/>
  </g>
</svg>
